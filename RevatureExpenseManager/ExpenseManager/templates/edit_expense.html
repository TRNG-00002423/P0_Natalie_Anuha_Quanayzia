<!DOCTYPE html>
<html>
<body>
    <h1>Edit Expense</h1>

    {% if error %}<p style="color:red">{{ error }}</p>{% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Amount: <input type="text" name="amount" value="{{ expense.amount }}"></label>
        <br><br>

        <label>Description: <input type="text" name="description" value="{{ expense.description }}"></label>
        <br><br>

        <button type="submit">Save Changes</button>
    </form>

    <a href="{% url 'edit_pending' %}">&larr; Back</a>
</body>
</html>
