<!DOCTYPE html>
<html>
<body>
    <h1>Employee Login</h1>

    {% if error %}<p style="color: red">{{ error }}</p>{% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Username: <input type="text" name="username"></label>
        <br><br>

        <label>Password: <input type="password" name="password"></label>
        <br><br>

        <button type="submit">Log In</button>
    </form>
</body>
</html>
